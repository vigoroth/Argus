services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: argus_pg
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev_pw
      POSTGRES_DB: argus
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # auto-creates the pgvector extension on first init
      - ./init:/docker-entrypoint-initdb.d:ro

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: argus_app
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      # reach Postgres over the compose network (service name + internal port 5432)
      DATABASE_URL: postgresql+psycopg://argus:argus_dev_pw@postgres:5432/argus
      ARGUS_BIND: 0.0.0.0
      # auth secrets pass through from the host env (see .env.example)
      ARGUS_USERNAME: ${ARGUS_USERNAME:-}
      ARGUS_PASSWORD_HASH: ${ARGUS_PASSWORD_HASH:-}
      ARGUS_SESSION_SECRET: ${ARGUS_SESSION_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ARGUS_BRAIN_PATH: /brain
      ARGUS_BRAIN_ENABLED: ${ARGUS_BRAIN_ENABLED:-true}
      ARGUS_BRAIN_AUTO_CAPTURE: ${ARGUS_BRAIN_AUTO_CAPTURE:-true}
      ARGUS_BRAIN_CONTEXT: ${ARGUS_BRAIN_CONTEXT:-true}
      ARGUS_BRAIN_REMOTE_CONTEXT: ${ARGUS_BRAIN_REMOTE_CONTEXT:-allow}
      ARGUS_BRAIN_CONTEXT_PROVIDERS: ${ARGUS_BRAIN_CONTEXT_PROVIDERS:-openai,anthropic,gemini}
      ARGUS_BRAIN_WATCH: ${ARGUS_BRAIN_WATCH:-true}
      # NOTE: the /term shell stays disabled — term_enabled() requires
      # ARGUS_TERM_ALLOW_REMOTE=1 when bind is not localhost, which we do not set.
    volumes:
      - model_cache:/app/model_cache
      - app_data:/app/data
      - "../Second Brain:/brain"

  grafana:
    image: grafana/grafana:latest
    container_name: argus_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      # auto-provisioned Postgres datasource + run-metrics dashboard
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - postgres

volumes:
  pgdata:
  grafana_data:
  model_cache:
  app_data:
