services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: argus_pg
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev_pw
      POSTGRES_DB: argus
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: argus_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - postgres

volumes:
  pgdata:
  grafana_data: