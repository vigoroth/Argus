apiVersion: 1

datasources:
  - name: Argus Postgres
    uid: argus-pg
    type: postgres
    access: proxy
    url: postgres:5432
    user: argus
    database: argus
    isDefault: true
    secureJsonData:
      password: argus_dev_pw
    jsonData:
      sslmode: disable
      postgresVersion: 1600
